<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab Notebook Apps</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172026;
      background: #edf2f4;
    }

    body {
      margin: 0;
    }

    main {
      width: min(760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: #5f6f7a;
      line-height: 1.5;
    }

    a {
      color: #1e7f74;
      font-weight: 750;
    }

    .app-list {
      display: grid;
      gap: 12px;
      padding: 0;
      list-style: none;
    }

    .app-list li {
      padding: 16px;
      border: 1px solid #c9d3d8;
      border-radius: 8px;
      background: #ffffff;
    }

    .app-list p {
      margin: 6px 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Lab Notebook Apps</h1>
    <p>Small public research tools extracted from the lab notebook.</p>

    <ul class="app-list">
      <li>
        <a href="./projects/03-confined-spheres-ui/">Confined Spheres UI</a>
        <p>Design a hard-bead confined-spheres LAMMPS run, export files, and inspect trajectories.</p>
      </li>
    </ul>
  </main>
</body>
</html>
